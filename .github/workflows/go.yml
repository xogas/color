name: Go

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v6.0.2

    - name: Set up Go
      uses: actions/setup-go@v6.2.0
      with:
        go-version-file: go.mod

    - name: Test
      run: go test -race -v ./...

    - name: Lint
      run: go vet ./...

    - name: Build
      run: go build -v ./...
